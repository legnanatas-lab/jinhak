<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>가온길 에듀 관리자 | GitHub Pages 데이터 관리</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preload" as="image" href="./assets/logo.png?v=20260617-github-admin-v5">
  <style>
    :root{--navy:#071426;--navy2:#123562;--blue:#2f80ed;--sky:#5ac8fa;--ice:#f4f8fd;--line:#dbe6f3;--ink:#172033;--muted:#64748b;--gold:#f2b84b;--danger:#c2410c;--ok:#127a4a;--shadow:0 18px 55px rgba(7,20,38,.14);--radius:22px}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans KR",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 0 0,rgba(47,128,237,.18),transparent 36rem),radial-gradient(circle at 100% 12%,rgba(90,200,250,.16),transparent 32rem),linear-gradient(180deg,#f8fbff,#edf3fa)}button,input,textarea,select{font:inherit}button{cursor:pointer}.login{min-height:100vh;display:grid;place-items:center;padding:28px}.login-card{width:min(460px,100%);padding:34px;border-radius:30px;background:#fff;box-shadow:var(--shadow);border:1px solid rgba(216,230,243,.9)}.login-card img{display:block;max-width:230px;margin:0 auto 22px}.login-card h1{text-align:center;margin:0 0 10px;font-size:26px}.login-card p{text-align:center;color:var(--muted);line-height:1.6}.field{display:flex;flex-direction:column;gap:7px;margin:12px 0}.field label{font-weight:800}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff}.field textarea{min-height:130px;resize:vertical}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 16px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--navy2),var(--blue));color:#fff;font-weight:900;box-shadow:0 10px 25px rgba(47,128,237,.18)}.btn.ghost{background:#fff;color:var(--navy2);border:1px solid var(--line);box-shadow:none}.btn.warn{background:linear-gradient(135deg,#9a3412,#f97316)}.btn.danger{background:linear-gradient(135deg,#7f1d1d,#dc2626)}.admin-shell{display:none}.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,rgba(7,20,38,.96),rgba(18,53,98,.96));color:#fff;box-shadow:0 16px 45px rgba(7,20,38,.18)}.topbar-inner{max-width:1380px;margin:0 auto;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:14px}.brand img{width:190px;height:50px;object-fit:contain;background:#fff;border-radius:999px;padding:5px 10px}.brand h1{font-size:20px;margin:0}.top-actions{display:flex;flex-wrap:wrap;gap:8px}.layout{max-width:1380px;margin:24px auto 80px;padding:0 22px;display:grid;grid-template-columns:250px minmax(0,1fr);gap:22px}.sidebar{position:sticky;top:96px;align-self:start;padding:16px;border:1px solid var(--line);background:rgba(255,255,255,.82);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(12px)}.tabs{display:grid;gap:8px}.tabs button{border:0;border-radius:15px;padding:13px 14px;background:transparent;text-align:left;font-weight:900;color:#344056}.tabs button.active{background:linear-gradient(135deg,var(--navy2),var(--blue));color:#fff}.panel{display:none}.panel.active{display:block}.card{margin-bottom:18px;padding:24px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.9);box-shadow:var(--shadow)}.card h2{margin:0 0 8px;font-size:24px;color:var(--navy2)}.card h3{margin:20px 0 8px;color:var(--navy2)}.help{color:var(--muted);line-height:1.65;margin:6px 0 14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid .full{grid-column:1/-1}.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.edit-list{display:grid;gap:14px}.item-card{padding:16px;border:1px solid #e3edf8;border-radius:18px;background:#fbfdff}.item-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.item-head strong{font-size:18px}.preview{display:grid;place-items:center;min-height:130px;border:1px dashed #cbd5e1;border-radius:18px;background:#f8fbff;overflow:hidden}.preview img{display:block;max-width:100%;max-height:270px;object-fit:contain}.status{min-height:24px;font-weight:900}.status.ok{color:var(--ok)}.status.err{color:var(--danger)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}.small{font-size:13px;color:var(--muted)}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;background:#eaf4ff;color:#174a88;font-weight:900;font-size:13px}.json-editor{min-height:480px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:13px}.hidden{display:none!important}@media(max-width:980px){.layout{grid-template-columns:1fr}.sidebar{position:static}.grid{grid-template-columns:1fr}.brand img{width:150px}.topbar-inner{align-items:flex-start;flex-direction:column}.top-actions{width:100%}.btn{flex:1}}@media(max-width:560px){.layout{padding:0 12px}.card{padding:18px;border-radius:18px}.login-card{padding:24px}.brand{align-items:flex-start;flex-direction:column}.top-actions .btn{width:100%}}
  </style>
</head>
<body>
  <section id="login" class="login">
    <div class="login-card">
      <img src="./assets/logo.png?v=20260617-github-admin-v5" alt="가온길 에듀 로고">
      <h1>관리자 로그인</h1>
      <p>GitHub Pages에 반영될 홈페이지 데이터를 편집합니다.</p>
      <form id="loginForm">
        <div class="field"><label for="adminId">아이디</label><input id="adminId" autocomplete="username" value="admin"></div>
        <div class="field"><label for="adminPw">비밀번호</label><input id="adminPw" type="password" autocomplete="current-password" placeholder="000000"></div>
        <button class="btn" style="width:100%" type="submit">로그인</button>
        <p id="loginMessage" class="status err"></p>
      </form>
    </div>
  </section>

  <section id="adminShell" class="admin-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand"><img id="topLogo" src="./assets/logo.png?v=20260617-github-admin-v5" alt="로고"><div><h1>가온길 에듀 관리자</h1><div class="small">홈페이지 내용 수정 · JSON 백업 · GitHub 데이터 업데이트</div></div></div>
        <div class="top-actions"><a class="btn ghost" href="./" target="_blank" rel="noopener">사이트 보기</a><button class="btn ghost" id="downloadJson" type="button">JSON 다운로드</button><button class="btn ghost" id="reloadData" type="button">데이터 다시 불러오기</button><button class="btn warn" id="logout" type="button">로그아웃</button></div>
      </div>
    </header>
    <main class="layout">
      <aside class="sidebar">
        <div class="tabs" id="tabs"></div>
        <p class="help small">수정 후 <b>임시 저장</b>은 이 브라우저에 저장되고, <b>GitHub 반영</b>을 눌러야 전체 방문자에게 적용됩니다.</p>
      </aside>
      <section>
        <div id="globalStatus" class="card"><span class="pill">대기</span> <span id="statusText">데이터를 불러오는 중입니다.</span></div>
        <section class="panel" data-panel="basic"></section>
        <section class="panel" data-panel="media"></section>
        <section class="panel" data-panel="menus"></section>
        <section class="panel" data-panel="home"></section>
        <section class="panel" data-panel="pages"></section>
        <section class="panel" data-panel="boards"></section>
        <section class="panel" data-panel="programs"></section>
        <section class="panel" data-panel="github"></section>
        <section class="panel" data-panel="raw"></section>
      </section>
    </main>
  </section>

<script>
(() => {
  const DATA_PATH = "assets/data/site-data.json";
  const STORAGE_KEY = "gaongil_admin_working_site";
  const GH_KEY = "gaongil_github_publish_settings";
  const AUTH_KEY = "gaongil_admin_authed";
  let site = null;
  let currentTab = "basic";
  const tabs = [
    ["basic","기본 정보"],["media","로고·배너·팝업"],["menus","메뉴/하위메뉴"],["home","홈 화면"],["pages","본문 페이지"],["boards","게시판"],["programs","프로그램/일정"],["github","GitHub 반영"],["raw","전체 JSON"]
  ];
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
  const h = (s="") => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const clone = v => JSON.parse(JSON.stringify(v));
  const setStatus = (msg, type="") => { $("#globalStatus .pill").textContent = type === "err" ? "오류" : type === "ok" ? "완료" : "안내"; $("#globalStatus .pill").style.background = type === "err" ? "#fee2e2" : type === "ok" ? "#dcfce7" : "#eaf4ff"; $("#statusText").textContent = msg; };
  const saveLocal = () => { site.__updatedAt = new Date().toISOString(); site.__dataVersion = "20260617-github-admin-v5"; localStorage.setItem(STORAGE_KEY, JSON.stringify(site)); localStorage.setItem("gijang_static_site", JSON.stringify(site)); setStatus("임시 저장되었습니다. GitHub 반영을 해야 전체 방문자에게 적용됩니다.", "ok"); render(); };
  const asLines = (arr, map) => (arr||[]).map(map).join("\n");
  const parseLines = (text, map) => String(text||"").split(/\n+/).map(x=>x.trim()).filter(Boolean).map(map);
  const imageSrc = v => { const s=String(v||"").trim(); if(!s) return ""; if(s.startsWith("data:")||s.startsWith("http")||s.startsWith("./")) return s; return "./"+s.replace(/^\//,""); };

  async function loadData(force=false){
    if(!force){ try{ const cached = localStorage.getItem(STORAGE_KEY); if(cached){ site = JSON.parse(cached); setStatus("브라우저 임시 저장 데이터를 불러왔습니다."); return; } }catch{} }
    const res = await fetch(DATA_PATH + "?_=" + Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error("site-data.json을 불러오지 못했습니다: " + res.status);
    site = await res.json();
    setStatus("GitHub Pages 데이터 파일을 불러왔습니다.", "ok");
  }

  function showAdmin(){ $("#login").classList.add("hidden"); $("#adminShell").style.display="block"; renderTabs(); render(); }
  function renderTabs(){ $("#tabs").innerHTML = tabs.map(t=>`<button type="button" data-tab="${t[0]}" class="${currentTab===t[0]?"active":""}">${t[1]}</button>`).join(""); $$("[data-tab]").forEach(btn=>btn.onclick=()=>{ collectCurrent(); currentTab=btn.dataset.tab; render(); }); }
  function render(){ if(!site) return; renderTabs(); $$(".panel").forEach(p=>p.classList.toggle("active", p.dataset.panel===currentTab)); if(currentTab==="basic") renderBasic(); if(currentTab==="media") renderMedia(); if(currentTab==="menus") renderMenus(); if(currentTab==="home") renderHome(); if(currentTab==="pages") renderPages(); if(currentTab==="boards") renderBoards(); if(currentTab==="programs") renderPrograms(); if(currentTab==="github") renderGithub(); if(currentTab==="raw") renderRaw(); const logo = imageSrc(site.logo); if(logo) $("#topLogo").src = logo; }
  function collectCurrent(){ try{ if(currentTab==="basic") collectBasic(); if(currentTab==="media") collectMedia(); if(currentTab==="menus") collectMenus(); if(currentTab==="home") collectHome(); if(currentTab==="pages") collectPages(); if(currentTab==="boards") collectBoards(); if(currentTab==="programs") collectPrograms(); if(currentTab==="raw") collectRaw(); }catch(e){ console.warn(e); } }

  function actionBar(){ return '<div class="row" style="margin-top:18px"><button class="btn" type="button" data-save-local>임시 저장</button><button class="btn ghost" type="button" data-goto-github>GitHub 반영 화면으로</button></div>'; }
  function bindCommonActions(root=document){ root.querySelectorAll('[data-save-local]').forEach(b=>b.onclick=()=>{ collectCurrent(); saveLocal(); }); root.querySelectorAll('[data-goto-github]').forEach(b=>b.onclick=()=>{ collectCurrent(); currentTab='github'; render(); }); }
  function renderBasic(){ const p=$("[data-panel=basic]"); p.innerHTML=`<div class="card"><h2>기본 정보</h2><p class="help">사이트명, 하단 주소, 저작권 문구를 수정합니다.</p><div class="grid"><div class="field"><label>사이트명</label><input id="siteName" value="${h(site.siteName)}"></div><div class="field"><label>로고 이미지 경로</label><input id="logo" value="${h(site.logo)}"></div><div class="field full"><label>하단 주소</label><textarea id="footerAddress">${h(site.footerAddress)}</textarea></div><div class="field full"><label>저작권 문구</label><input id="copyright" value="${h(site.copyright)}"></div></div>${actionBar()}</div>`; bindCommonActions(p); }
  function collectBasic(){ site.siteName=$("#siteName")?.value.trim()||site.siteName; site.logo=$("#logo")?.value.trim()||site.logo; site.footerAddress=$("#footerAddress")?.value||""; site.copyright=$("#copyright")?.value||""; }

  function imageField(label,key,value){ return `<div class="field full"><label>${label}</label><div class="preview"><img src="${h(imageSrc(value))}" alt="${label}"></div><input data-img-key="${key}" value="${h(value)}"><input type="file" accept="image/*" data-img-upload="${key}"><div class="small">경로 입력 또는 이미지 파일 업로드 가능. 업로드 이미지는 WebP 데이터로 압축 저장됩니다.</div></div>`; }
  function renderMedia(){ const p=$("[data-panel=media]"); site.home=site.home||{}; site.popups=site.popups||[]; p.innerHTML=`<div class="card"><h2>로고·배너</h2><div class="grid">${imageField("로고", "logo", site.logo)}${imageField("메인 배너", "home.mainBanner", site.home.mainBanner)}${imageField("하단 왼쪽 배너", "home.bottomBannerLeft", site.home.bottomBannerLeft)}${imageField("하단 오른쪽 배너", "home.bottomBannerRight", site.home.bottomBannerRight)}</div>${actionBar()}</div><div class="card"><div class="item-head"><div><h2>공지 팝업</h2><p class="help">팝업 개수, 이미지, 위치, 가로/세로 크기를 설정합니다.</p></div><button class="btn ghost" type="button" id="addPopup">팝업 추가</button></div><div class="edit-list" id="popupList">${site.popups.map((pop,i)=>popupCard(pop,i)).join("")}</div>${actionBar()}</div>`; $$("[data-img-upload]",p).forEach(input=>input.onchange=()=>compressImage(input, data=>{ const key=input.dataset.imgUpload; setByPath(key,data); if(key==="logo") site.logoCustom=true; if(key==="home.mainBanner") site.home.mainBannerCustom=true; renderMedia(); setStatus("이미지가 압축 저장되었습니다.","ok"); })); $("#addPopup").onclick=()=>{ collectMedia(); site.popups.push({id:"popup"+(site.popups.length+1),enabled:true,image:"",left:10,top:10,width:450,height:800}); renderMedia(); }; p.addEventListener("click", ev=>{ if(ev.target.matches("[data-remove-popup]")){ collectMedia(); site.popups.splice(Number(ev.target.dataset.removePopup),1); renderMedia(); } }); p.addEventListener("change", ev=>{ if(ev.target.matches("[data-popup-upload]")){ const i=Number(ev.target.dataset.popupUpload); compressImage(ev.target,data=>{ site.popups[i].image=data; site.popups[i].imageCustom=true; renderMedia(); setStatus("팝업 이미지가 압축 저장되었습니다.","ok"); }, {maxW:900,maxH:1500}); }}); bindCommonActions(p); }
  function popupCard(pop,i){ return `<div class="item-card" data-popup="${i}"><div class="item-head"><strong>팝업 ${i+1}</strong><button class="btn danger" type="button" data-remove-popup="${i}">삭제</button></div><div class="grid"><div class="field"><label><input type="checkbox" data-p="enabled" ${pop.enabled!==false?"checked":""}> 사용</label></div><div class="field"><label>아이디</label><input data-p="id" value="${h(pop.id||'popup'+(i+1))}"></div><div class="field full"><label>이미지</label><div class="preview"><img src="${h(imageSrc(pop.image))}"></div><input data-p="image" value="${h(pop.image||'')}"><input type="file" accept="image/*" data-popup-upload="${i}"></div><div class="field"><label>왼쪽</label><input type="number" data-p="left" value="${h(pop.left||0)}"></div><div class="field"><label>위쪽</label><input type="number" data-p="top" value="${h(pop.top||0)}"></div><div class="field"><label>가로</label><input type="number" data-p="width" value="${h(pop.width||450)}"></div><div class="field"><label>세로</label><input type="number" data-p="height" value="${h(pop.height||800)}"></div></div></div>`; }
  function collectMedia(){ $$("[data-img-key]").forEach(i=>setByPath(i.dataset.imgKey,i.value.trim())); site.popups=$$("[data-popup]").map(card=>({ id:$("[data-p=id]",card).value.trim(), enabled:$("[data-p=enabled]",card).checked, image:$("[data-p=image]",card).value.trim(), left:Number($("[data-p=left]",card).value)||0, top:Number($("[data-p=top]",card).value)||0, width:Number($("[data-p=width]",card).value)||450, height:Number($("[data-p=height]",card).value)||800 })); }

  function renderMenus(){ const p=$("[data-panel=menus]"); p.innerHTML=`<div class="card"><div class="item-head"><div><h2>메뉴/하위메뉴</h2><p class="help">하위메뉴는 한 줄에 <b>메뉴명|링크</b> 형식으로 입력합니다.</p></div><button class="btn ghost" id="addMenu" type="button">메뉴 추가</button></div><div class="edit-list">${(site.nav||[]).map((m,i)=>`<div class="item-card" data-menu="${i}"><div class="item-head"><strong>메뉴 ${i+1}</strong><button class="btn danger" type="button" data-remove-menu="${i}">삭제</button></div><div class="grid"><div class="field"><label>메뉴명</label><input data-m="title" value="${h(m.title)}"></div><div class="field"><label>링크</label><input data-m="href" value="${h(m.href)}"></div><div class="field full"><label>하위메뉴</label><textarea data-m="children">${h(asLines(m.children, c=>`${c.title||''}|${c.href||''}`))}</textarea></div></div></div>`).join("")}</div>${actionBar()}</div>`; $("#addMenu").onclick=()=>{collectMenus();site.nav.push({title:"새 메뉴",href:"/",children:[]});renderMenus();}; p.addEventListener("click",ev=>{if(ev.target.matches("[data-remove-menu]")){collectMenus();site.nav.splice(Number(ev.target.dataset.removeMenu),1);renderMenus();}}); bindCommonActions(p); }
  function collectMenus(){ site.nav=$$("[data-menu]").map(card=>({ title:$("[data-m=title]",card).value.trim(), href:$("[data-m=href]",card).value.trim(), children:parseLines($("[data-m=children]",card).value, line=>{const [title,href=""] = line.split("|"); return {title:title.trim(), href:href.trim()};}) })); }

  function renderHome(){ const p=$("[data-panel=home]"); site.home=site.home||{}; p.innerHTML=`<div class="card"><h2>홈 화면 문구</h2><div class="grid"><div class="field full"><label>상담 신청 버튼 문구</label><input id="ctaText" value="${h(site.home.ctaText||'')}"></div><div class="field"><label>주요사업 제목</label><input id="businessTitle" value="${h(site.home.businessTitle||'')}"></div><div class="field full"><label>주요사업 내용 HTML</label><textarea id="businessHtml">${h(site.home.businessHtml||'')}</textarea></div></div>${actionBar()}</div><div class="card"><h2>공지 탭</h2><p class="help">게시글은 한 줄에 <b>태그|제목|링크</b> 형식입니다.</p><div class="edit-list">${(site.home.noticeTabs||site.noticeTabs||[]).map((tab,i)=>`<div class="item-card" data-notice-tab="${i}"><div class="grid"><div class="field"><label>탭 이름</label><input data-nt="label" value="${h(tab.label)}"></div><div class="field"><label>더보기 링크</label><input data-nt="href" value="${h(tab.href||'')}"></div><div class="field full"><label>게시글</label><textarea data-nt="items">${h(asLines(tab.items, it=>`${it.tag||''}|${it.title||''}|${it.href||''}`))}</textarea></div></div></div>`).join("")}</div>${actionBar()}</div>`; bindCommonActions(p); }
  function collectHome(){ site.home=site.home||{}; site.home.ctaText=$("#ctaText")?.value||""; site.home.businessTitle=$("#businessTitle")?.value||""; site.home.businessHtml=$("#businessHtml")?.value||""; const tabs=$$("[data-notice-tab]").map(card=>({ label:$("[data-nt=label]",card).value.trim(), href:$("[data-nt=href]",card).value.trim(), items:parseLines($("[data-nt=items]",card).value,line=>{const [tag,title,href=""] = line.split("|"); return {tag:tag.trim(),title:title.trim(),href:href.trim()};}) })); site.noticeTabs=tabs; site.home.noticeTabs=tabs; }

  function selectOptions(arr, labelKey="title"){ return (arr||[]).map((x,i)=>`<option value="${i}">${h(x[labelKey]||x.path||('항목 '+(i+1)))}</option>`).join(""); }
  function renderPages(){ const p=$("[data-panel=pages]"); site.contentPages=site.contentPages||[]; p.innerHTML=`<div class="card"><div class="item-head"><div><h2>본문 페이지</h2><p class="help">메뉴 하부에 연결된 소개/프로그램 설명 페이지를 수정합니다.</p></div><button class="btn ghost" id="addPage" type="button">페이지 추가</button></div><div class="field"><label>수정할 페이지 선택</label><select id="pageSelect">${selectOptions(site.contentPages)}</select></div><div id="pageEditor"></div>${actionBar()}</div>`; $("#pageSelect").onchange=renderPageEditor; $("#addPage").onclick=()=>{collectPages();site.contentPages.push({path:"/content/new/",crumb:"",title:"새 페이지",subtitle:"",html:""});renderPages();$("#pageSelect").value=site.contentPages.length-1;renderPageEditor();}; renderPageEditor(); bindCommonActions(p); }
  function renderPageEditor(){ const i=Number($("#pageSelect").value||0), x=site.contentPages[i]||{}; $("#pageEditor").innerHTML=`<div class="grid" data-page-editor="${i}"><div class="field"><label>경로</label><input data-pg="path" value="${h(x.path||'')}"></div><div class="field"><label>상위명</label><input data-pg="crumb" value="${h(x.crumb||'')}"></div><div class="field"><label>제목</label><input data-pg="title" value="${h(x.title||'')}"></div><div class="field"><label>부제목</label><input data-pg="subtitle" value="${h(x.subtitle||'')}"></div><div class="field"><label>버튼 문구</label><input data-pg="ctaText" value="${h(x.ctaText||'')}"></div><div class="field"><label>버튼 링크</label><input data-pg="ctaHref" value="${h(x.ctaHref||'')}"></div><div class="field full"><label>본문 HTML</label><textarea data-pg="html" style="min-height:260px">${h(x.html||'')}</textarea></div><div class="row full"><button class="btn danger" type="button" id="deletePage">현재 페이지 삭제</button></div></div>`; $("#deletePage").onclick=()=>{ if(confirm("현재 페이지를 삭제할까요?")){ site.contentPages.splice(i,1); renderPages(); } }; }
  function collectPages(){ const ed=$("[data-page-editor]"); if(!ed) return; const i=Number(ed.dataset.pageEditor); site.contentPages[i]={...(site.contentPages[i]||{}), path:$("[data-pg=path]",ed).value.trim(), crumb:$("[data-pg=crumb]",ed).value.trim(), title:$("[data-pg=title]",ed).value.trim(), subtitle:$("[data-pg=subtitle]",ed).value.trim(), ctaText:$("[data-pg=ctaText]",ed).value.trim(), ctaHref:$("[data-pg=ctaHref]",ed).value.trim(), html:$("[data-pg=html]",ed).value}; }

  function renderBoards(){ const p=$("[data-panel=boards]"); site.boards=site.boards||[]; p.innerHTML=`<div class="card"><div class="item-head"><div><h2>게시판</h2><p class="help">게시글은 한 줄에 <b>제목|날짜|본문 HTML</b> 형식입니다.</p></div><button class="btn ghost" id="addBoard" type="button">게시판 추가</button></div><div class="edit-list">${site.boards.map((b,i)=>`<div class="item-card" data-board="${i}"><div class="item-head"><strong>${h(b.title||'게시판')}</strong><button class="btn danger" type="button" data-remove-board="${i}">삭제</button></div><div class="grid"><div class="field"><label>경로</label><input data-b="path" value="${h(b.path||'')}"></div><div class="field"><label>게시판명</label><input data-b="title" value="${h(b.title||'')}"></div><div class="field"><label>상위명</label><input data-b="crumb" value="${h(b.crumb||'')}"></div><div class="field full"><label>설명</label><input data-b="description" value="${h(b.description||'')}"></div><div class="field full"><label>게시글</label><textarea data-b="items" style="min-height:220px">${h(asLines(b.items, it=>`${it.title||''}|${it.date||''}|${String(it.html||'').replace(/\n/g,' ')}`))}</textarea></div></div></div>`).join("")}</div>${actionBar()}</div>`; $("#addBoard").onclick=()=>{collectBoards();site.boards.push({path:"/board/new",title:"새 게시판",crumb:"",description:"",items:[]});renderBoards();}; p.addEventListener("click",ev=>{if(ev.target.matches("[data-remove-board]")){collectBoards();site.boards.splice(Number(ev.target.dataset.removeBoard),1);renderBoards();}}); bindCommonActions(p); }
  function collectBoards(){ site.boards=$$("[data-board]").map(card=>({ path:$("[data-b=path]",card).value.trim(), title:$("[data-b=title]",card).value.trim(), crumb:$("[data-b=crumb]",card).value.trim(), description:$("[data-b=description]",card).value.trim(), items:parseLines($("[data-b=items]",card).value,line=>{const [title,date,html=""] = line.split("|"); return {title:title.trim(),date:date.trim(),html:html.trim()};}) })); }

  function renderPrograms(){ const p=$("[data-panel=programs]"); site.applicationPrograms=site.applicationPrograms||[]; p.innerHTML=`<div class="card"><div class="item-head"><div><h2>프로그램/일정</h2><p class="help">일정은 한 줄에 <b>사용여부|날짜|장소|담당자ID|시간1,시간2</b> 형식입니다. 예: true|2026-07-01|정관에듀파크|andong3|13:00,14:00</p></div><button class="btn ghost" id="addProgram" type="button">프로그램 추가</button></div><div class="edit-list">${site.applicationPrograms.map((pr,i)=>`<div class="item-card" data-program="${i}"><div class="item-head"><strong>${h(pr.title||'프로그램')}</strong><button class="btn danger" type="button" data-remove-program="${i}">삭제</button></div><div class="grid"><div class="field"><label><input type="checkbox" data-pr="enabled" ${pr.enabled!==false?'checked':''}> 사용</label></div><div class="field"><label>ID</label><input data-pr="id" value="${h(pr.id||'')}"></div><div class="field"><label>제목</label><input data-pr="title" value="${h(pr.title||'')}"></div><div class="field"><label>안내 경로</label><input data-pr="path" value="${h(pr.path||'')}"></div><div class="field"><label>신청 경로</label><input data-pr="writePath" value="${h(pr.writePath||'')}"></div><div class="field full"><label>기본 상담 희망 내용</label><textarea data-pr="defaultContent">${h(pr.defaultContent||'')}</textarea></div><div class="field full"><label>일정</label><textarea data-pr="schedules" style="min-height:180px">${h(asLines(pr.schedules, s=>`${s.enabled!==false}|${s.date||''}|${s.place||''}|${s.consultantId||''}|${(s.times||[]).join(',')}`))}</textarea></div></div></div>`).join("")}</div>${actionBar()}</div>`; $("#addProgram").onclick=()=>{collectPrograms();site.applicationPrograms.push({id:"new",enabled:true,title:"새 프로그램",path:"/content/new/",writePath:"/write",defaultContent:"",schedules:[]});renderPrograms();}; p.addEventListener("click",ev=>{if(ev.target.matches("[data-remove-program]")){collectPrograms();site.applicationPrograms.splice(Number(ev.target.dataset.removeProgram),1);renderPrograms();}}); bindCommonActions(p); }
  function collectPrograms(){ site.applicationPrograms=$$("[data-program]").map(card=>({ enabled:$("[data-pr=enabled]",card).checked, id:$("[data-pr=id]",card).value.trim(), title:$("[data-pr=title]",card).value.trim(), path:$("[data-pr=path]",card).value.trim(), writePath:$("[data-pr=writePath]",card).value.trim(), defaultContent:$("[data-pr=defaultContent]",card).value, schedules:parseLines($("[data-pr=schedules]",card).value,line=>{const [enabled,date,place,consultantId,times=""] = line.split("|"); return {id:(date||'')+'-'+(consultantId||'')+'-'+Math.random().toString(36).slice(2,6), enabled:String(enabled).trim()!=="false", date:(date||'').trim(), place:(place||'').trim(), consultantId:(consultantId||'').trim(), times:times.split(',').map(x=>x.trim()).filter(Boolean)};}) })); }

  function renderGithub(){ const p=$("[data-panel=github]"); const d=JSON.parse(localStorage.getItem(GH_KEY)||"{}"); p.innerHTML=`<div class="card"><h2>GitHub에 데이터 업데이트</h2><p class="help">아래 정보로 현재 데이터를 <b>assets/data/site-data.json</b>에 커밋합니다. 토큰은 GitHub Fine-grained token에서 해당 저장소의 <b>Contents: Read and write</b> 권한이 필요합니다.</p><div class="grid"><div class="field"><label>GitHub 아이디/소유자</label><input id="ghOwner" value="${h(d.owner||'')}" placeholder="예: legnanatas-lab"></div><div class="field"><label>저장소 이름</label><input id="ghRepo" value="${h(d.repo||'')}" placeholder="예: jinhak"></div><div class="field"><label>브랜치</label><input id="ghBranch" value="${h(d.branch||'main')}"></div><div class="field"><label>파일 경로</label><input id="ghPath" value="${h(d.path||'assets/data/site-data.json')}"></div><div class="field full"><label>GitHub Personal Access Token</label><input id="ghToken" type="password" autocomplete="off" placeholder="토큰은 저장하지 않습니다"></div></div><div class="row"><button class="btn" id="publishGithub" type="button">현재 데이터 GitHub에 반영</button><button class="btn ghost" id="checkGithub" type="button">연결 확인</button><button class="btn ghost" id="copyJson" type="button">JSON 복사</button></div><p id="githubStatus" class="status"></p></div>`; $("#publishGithub").onclick=()=>publishGithub(false); $("#checkGithub").onclick=()=>publishGithub(true); $("#copyJson").onclick=async()=>{ await navigator.clipboard.writeText(JSON.stringify(site,null,2)); $("#githubStatus").textContent="JSON을 복사했습니다."; $("#githubStatus").className="status ok"; }; }
  async function publishGithub(checkOnly){ collectCurrent(); const owner=$("#ghOwner").value.trim(), repo=$("#ghRepo").value.trim(), branch=$("#ghBranch").value.trim()||"main", path=$("#ghPath").value.trim()||"assets/data/site-data.json", token=$("#ghToken").value.trim(), st=$("#githubStatus"); if(!owner||!repo||!token){ st.textContent="GitHub 아이디, 저장소, 토큰을 입력해주세요."; st.className="status err"; return; } localStorage.setItem(GH_KEY, JSON.stringify({owner,repo,branch,path})); st.textContent=checkOnly?"GitHub 파일을 확인하는 중입니다...":"GitHub에 커밋하는 중입니다..."; st.className="status"; try{ const url=`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path.split('/').map(encodeURIComponent).join('/')}`; const headers={"Accept":"application/vnd.github+json","Authorization":"Bearer "+token,"X-GitHub-Api-Version":"2022-11-28"}; let sha=""; const cur=await fetch(url+`?ref=${encodeURIComponent(branch)}`,{headers}); if(cur.ok){ sha=(await cur.json()).sha||""; } else if(cur.status!==404){ throw new Error(`파일 확인 실패 ${cur.status}: ${await cur.text()}`); } if(checkOnly){ st.textContent=sha?"연결 확인 완료: 기존 site-data.json을 찾았습니다.":"연결 확인 완료: 새 site-data.json으로 생성 가능합니다."; st.className="status ok"; return; } site.__updatedAt=new Date().toISOString(); site.__dataVersion="20260617-github-admin-v5"; const body={message:`Update Gaongil site data ${site.__updatedAt}`,content:toBase64(JSON.stringify(site,null,2)),branch}; if(sha) body.sha=sha; const saved=await fetch(url,{method:"PUT",headers:{...headers,"Content-Type":"application/json"},body:JSON.stringify(body)}); if(!saved.ok) throw new Error(`업데이트 실패 ${saved.status}: ${await saved.text()}`); localStorage.setItem(STORAGE_KEY, JSON.stringify(site)); localStorage.setItem("gijang_static_site", JSON.stringify(site)); st.textContent="GitHub 커밋 완료. 1~3분 후 전체 방문자 페이지에 반영됩니다."; st.className="status ok"; }catch(e){ st.textContent=e.message||"GitHub 반영 실패"; st.className="status err"; } }

  function renderRaw(){ const p=$("[data-panel=raw]"); p.innerHTML=`<div class="card"><h2>전체 JSON 편집</h2><p class="help">세부 항목이 화면에 없을 때 직접 JSON을 수정할 수 있습니다.</p><textarea id="rawJson" class="json-editor">${h(JSON.stringify(site,null,2))}</textarea>${actionBar()}</div>`; bindCommonActions(p); }
  function collectRaw(){ const raw=$("#rawJson")?.value; if(!raw) return; site=JSON.parse(raw); }

  function setByPath(path,value){ const parts=path.split('.'); let obj=site; while(parts.length>1){ const p=parts.shift(); obj[p]=obj[p]||{}; obj=obj[p]; } obj[parts[0]]=value; }
  function compressImage(input, done, opt={}){ const file=input.files&&input.files[0]; if(!file) return; if(!/^image\//.test(file.type)){ alert("이미지 파일만 업로드 가능합니다."); return; } const reader=new FileReader(); reader.onload=()=>{ const img=new Image(); img.onload=()=>{ const maxW=opt.maxW||1600, maxH=opt.maxH||1200, q=opt.quality||.82; let w=img.naturalWidth,h=img.naturalHeight,scale=Math.min(1,maxW/w,maxH/h); w=Math.round(w*scale); h=Math.round(h*scale); const c=document.createElement('canvas'); c.width=w; c.height=h; const ctx=c.getContext('2d',{alpha:false}); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); done(c.toDataURL('image/webp',q)); }; img.onerror=()=>done(String(reader.result)); img.src=String(reader.result); }; reader.readAsDataURL(file); }
  function toBase64(text){ const bytes=new TextEncoder().encode(text); let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); }
  function downloadJson(){ collectCurrent(); const blob=new Blob([JSON.stringify(site,null,2)],{type:'application/json;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='site-data.json'; a.click(); URL.revokeObjectURL(a.href); }

  $("#loginForm").onsubmit = async ev => { ev.preventDefault(); const id=$("#adminId").value.trim(), pw=$("#adminPw").value; if(id==="admin" && (pw==="000000" || pw==="0000")){ sessionStorage.setItem(AUTH_KEY,"1"); try{ await loadData(false); showAdmin(); }catch(e){ $("#loginMessage").textContent=e.message; } } else { $("#loginMessage").textContent="아이디 또는 비밀번호를 확인해주세요."; } };
  $("#logout").onclick=()=>{ sessionStorage.removeItem(AUTH_KEY); location.reload(); };
  $("#downloadJson").onclick=downloadJson;
  $("#reloadData").onclick=async()=>{ if(confirm("브라우저 임시 저장 내용을 버리고 GitHub 데이터 파일을 다시 불러올까요?")){ localStorage.removeItem(STORAGE_KEY); await loadData(true); render(); } };
  if(sessionStorage.getItem(AUTH_KEY)==="1"){ loadData(false).then(showAdmin).catch(e=>setStatus(e.message,"err")); }
})();
</script>
</body>
</html>
