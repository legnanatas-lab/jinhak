  <meta property="og:type" content="website">

  <link rel="canonical" href="https://legnanatas-lab.github.io/jinhak/">
</head>
<body>
  <script>
    (async function () {
      const parts = location.pathname.split("/").filter(Boolean);
      for (let i = parts.length; i >= 0; i -= 1) {
        const base = "/" + parts.slice(0, i).join("/") + (i ? "/" : "");
        try {
          const response = await fetch(base + "index.html", { method: "HEAD", cache: "no-store" });
          if (!response.ok) continue;
          const basePath = base === "/" ? "" : base.slice(0, -1);
          const route = location.pathname.slice(basePath.length) || "/";
          location.replace(base + "#" + route + location.search);
          return;
        } catch {}
      }
      location.replace("/#" + location.pathname + location.search);
    })();
  </script>
  <p>페이지를 이동하고 있습니다.</p>
</body>
</html>
