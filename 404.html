  <style id="gaongil-critical-loading-style">
    html, body { margin: 0; background: #f8fbff; }
    #app:empty {
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 0%, rgba(47, 128, 237, .10), transparent 32rem),
        radial-gradient(circle at 100% 16%, rgba(90, 200, 250, .12), transparent 34rem),
        linear-gradient(180deg, #f8fbff 0%, #f4f8fd 54%, #eef4fb 100%);
    }
  </style>
</head>
<body>
  <script>
    (async function () {
      const parts = location.pathname.split("/").filter(Boolean);
      for (let i = parts.length; i >= 0; i -= 1) {
        const base = "/" + parts.slice(0, i).join("/") + (i ? "/" : "");
        try {
          const response = await fetch(base + "index.html", { method: "HEAD", cache: "no-store" });
          if (!response.ok) continue;
          const basePath = base === "/" ? "" : base.slice(0, -1);
          const route = location.pathname.slice(basePath.length) || "/";
          location.replace(base + "#" + route + location.search);
          return;
        } catch {}
      }
      location.replace("/#" + location.pathname + location.search);
    })();
  </script>
  <p>페이지를 이동하고 있습니다.</p>
</body>
